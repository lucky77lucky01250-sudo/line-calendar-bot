name: Keep Render Alive

on:
  schedule:
    - cron: '*/5 * * * *'  # 5分おきに実行
  workflow_dispatch:        # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          curl -s https://line-calendar-bot-vqr2.onrender.com/ || true
          echo "Ping sent at $(date)"
