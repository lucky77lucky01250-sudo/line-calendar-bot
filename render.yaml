services:
  - type: web
    name: line-calendar-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: TIMEZONE
        value: Asia/Tokyo

  - type: cron
    name: morning-cron
    env: python
    buildCommand: echo "no build needed"
    schedule: "0 22 * * *"
    startCommand: python cron_trigger.py
    envVars:
      - key: BOT_URL
        sync: false
      - key: CRON_SECRET
        sync: false
